  <h1>密碼日記本 隱私政策</h1>
  <p><strong>密碼日記本</strong> 是一款專注於個人隱私保護的日記記錄應用，所有資料僅保存在您的裝置本地。</p>
  <p><strong>我們不會收集、儲存或傳輸您的任何個人資料。</strong></p>
  <p>本應用完全離線運行，無需網路連接，不包含廣告，也不請求任何敏感權限（如位置、通訊錄、照片存取等）。您所寫的所有日記、新增的照片或影片均僅儲存於您的裝置中，不會上傳至任何伺服器。</p>
  <p>出於隱私安全設計，當您卸載本應用時，所有本地資料將被自動徹底清除，無法恢復。請務必在需要時透過「匯出PDF」功能備份重要日記。</p>
  <p>您可以安心使用，享受私密、安全、簡潔的日記體驗。</p>
  <p>如有疑問，請聯絡：support@zhaoshaodan.com</p>
