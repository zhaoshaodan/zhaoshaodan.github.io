  <h1>密码日记本 隐私政策</h1>
  <p><strong>密码日记本</strong> 是一款专注于个人隐私保护的日记记录应用，所有数据仅保存在您的设备本地。</p>
  <p><strong>我们不会收集、存储或传输您的任何个人数据。</strong></p>
  <p>本应用完全离线运行，无需网络连接，不包含广告，也不请求任何敏感权限（如位置、通讯录、照片访问等）。您所写的所有日记、添加的照片或视频均仅存储于您的设备中，不会上传至任何服务器。</p>

  <p>您可以安心使用，享受私密、安全、简洁的日记体验。</p>
